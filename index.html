<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ NeonMess</title>
    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.7.4.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root { --bg:#0a0f0a;--bg2:#111a11;--chat-bg:#0a0f0a;--text:#c8e6c8;--text2:#8fbc8f;--bubble-sent:#1a3a1a;--bubble-rec:#152015;--header:#111a11;--border:#2a3a2a;--online:#5aeb5a;--accent:#3adb3a;--accent2:#2a8a2a;--input:#152015;--hover:rgba(58,219,58,0.05);--shadow:0 0 20px rgba(58,219,58,0.08);--snow:block; }
        [data-theme="dark"] { --bg:#0a0a0a;--bg2:#111;--chat-bg:#0a0a0a;--text:#ddd;--text2:#999;--bubble-sent:#222;--bubble-rec:#181818;--header:#111;--border:#333;--online:#4ade80;--accent:#667eea;--accent2:#764ba2;--input:#181818;--hover:rgba(255,255,255,0.03);--shadow:0 0 20px rgba(0,0,0,0.3);--snow:none; }
        [data-theme="neon"] { --bg:#000;--bg2:#0a0a0a;--chat-bg:#000;--text:#0f0;--text2:#0a0;--bubble-sent:#003300;--bubble-rec:#001a00;--header:#0a0a0a;--border:#333;--online:#0f0;--accent:#0f0;--accent2:#0a0;--input:#001a00;--hover:rgba(0,255,0,0.05);--snow:none; }
        [data-theme="purple"] { --bg:#0d001a;--bg2:#1a0033;--chat-bg:#0d001a;--text:#e0c0ff;--text2:#b080e0;--bubble-sent:#2d004d;--bubble-rec:#1a0033;--header:#1a0033;--border:#4a0080;--online:#c084fc;--accent:#a855f7;--accent2:#7e22ce;--input:#1a0033;--hover:rgba(168,85,247,0.05);--snow:none; }
        [data-theme="sunset"] { --bg:#1a0a00;--bg2:#2d1500;--chat-bg:#1a0a00;--text:#ffe0c0;--text2:#c0a080;--bubble-sent:#4d2000;--bubble-rec:#2d1500;--header:#2d1500;--border:#604020;--online:#ff8844;--accent:#ff6600;--accent2:#cc4400;--input:#2d1500;--hover:rgba(255,102,0,0.05);--snow:none; }
        [data-theme="ocean"] { --bg:#001020;--bg2:#001830;--chat-bg:#001020;--text:#c0e0ff;--text2:#80b0d0;--bubble-sent:#002050;--bubble-rec:#001830;--header:#001830;--border:#003060;--online:#40a0ff;--accent:#2080ff;--accent2:#1060cc;--input:#001830;--hover:rgba(32,128,255,0.05);--snow:none; }
        [data-theme="cyberpunk"] { --bg:#0a0a00;--bg2:#1a1a00;--chat-bg:#0a0a00;--text:#ffff00;--text2:#aaaa00;--bubble-sent:#2a2a00;--bubble-rec:#1a1a00;--header:#1a1a00;--border:#3a3a00;--online:#ffff00;--accent:#ffcc00;--accent2:#cc9900;--input:#1a1a00;--hover:rgba(255,204,0,0.05);--snow:none; }
        [data-theme="minecraft"] { --bg:#1a0e00;--bg2:#2d1a00;--chat-bg:#1a0e00;--text:#c8b896;--text2:#8b7a5e;--bubble-sent:#3d2a10;--bubble-rec:#2d1a00;--header:#2d1a00;--border:#4a3520;--online:#5a9e3d;--accent:#8b6b3d;--accent2:#5c3c1a;--input:#2d1a00;--hover:rgba(139,122,94,0.1);--snow:block; }
        [data-theme="pink"] { --bg:#1a0010;--bg2:#2d0018;--chat-bg:#1a0010;--text:#ffc0e0;--text2:#d080a0;--bubble-sent:#4d0028;--bubble-rec:#2d0018;--header:#2d0018;--border:#600040;--online:#ff4088;--accent:#ff2080;--accent2:#cc0060;--input:#2d0018;--hover:rgba(255,32,128,0.05);--snow:none; }
        [data-theme="drift"] { --bg:#0a0a0a;--bg2:#111;--chat-bg:#0a0a0a;--text:#fff;--text2:#aaa;--bubble-sent:#ff4500;--bubble-rec:#1a1a1a;--header:#111;--border:#333;--online:#ff6600;--accent:#ff4500;--accent2:#cc3300;--input:#1a1a1a;--hover:rgba(255,69,0,0.1);--snow:none; }
        [data-theme="fairy"] { --bg:#1a0520;--bg2:#2d0a35;--chat-bg:#1a0520;--text:#f0d0ff;--text2:#c0a0d0;--bubble-sent:#4d1a6e;--bubble-rec:#2d0a35;--header:#2d0a35;--border:#5a2080;--online:#ff88cc;--accent:#e040ff;--accent2:#b020cc;--input:#2d0a35;--hover:rgba(224,64,255,0.08);--snow:none; }
        [data-theme="princess"] { --bg:#1a0015;--bg2:#2d0022;--chat-bg:#1a0015;--text:#ffe0f0;--text2:#d0a0b0;--bubble-sent:#4d0035;--bubble-rec:#2d0022;--header:#2d0022;--border:#601040;--online:#ff69b4;--accent:#ff1493;--accent2:#cc0066;--input:#2d0022;--hover:rgba(255,20,147,0.08);--snow:none; }
        [data-theme="boy"] { --bg:#001020;--bg2:#001830;--chat-bg:#001020;--text:#c0e0ff;--text2:#80b0d0;--bubble-sent:#003060;--bubble-rec:#001830;--header:#001830;--border:#004080;--online:#4080ff;--accent:#2060ff;--accent2:#1040cc;--input:#001830;--hover:rgba(32,96,255,0.08);--snow:none; }
        [data-theme="girl"] { --bg:#1a0010;--bg2:#2d0018;--chat-bg:#1a0010;--text:#ffc0e0;--text2:#d080a0;--bubble-sent:#4d0028;--bubble-rec:#2d0018;--header:#2d0018;--border:#600040;--online:#ff4088;--accent:#ff2080;--accent2:#cc0060;--input:#2d0018;--hover:rgba(255,32,128,0.08);--snow:none; }
        [data-theme="tg"] { --bg:#e8ecef;--bg2:#fff;--chat-bg:#e8ecef;--text:#000;--text2:#8e8e93;--bubble-sent:#007aff;--bubble-rec:#fff;--header:#fff;--border:#d1d1d6;--online:#34c759;--accent:#007aff;--accent2:#0051d5;--input:#f1f1f1;--hover:rgba(0,122,255,0.08);--snow:none; }
        [data-theme="tg-dark"] { --bg:#1c1c1e;--bg2:#2c2c2e;--chat-bg:#1c1c1e;--text:#fff;--text2:#8e8e93;--bubble-sent:#007aff;--bubble-rec:#2c2c2e;--header:#2c2c2e;--border:#3a3a3c;--online:#34c759;--accent:#007aff;--accent2:#0051d5;--input:#3a3a3c;--hover:rgba(0,122,255,0.1);--snow:none; }
        * { margin:0;padding:0;box-sizing:border-box; }
        body { font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);height:100vh;width:100vw;overflow:hidden;-webkit-tap-highlight-color:transparent;user-select:none;position:fixed; }
        .snow-container { display:var(--snow);position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1; }
        .snowflake { position:absolute;top:-10px;color:rgba(255,255,255,0.3);font-size:14px;animation:fall linear infinite; }
        @keyframes fall { 0%{transform:translateY(-10px)rotate(0deg);opacity:0.6} 100%{transform:translateY(105vh)rotate(360deg);opacity:0} }
        .login-screen { height:100vh;width:100vw;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px;position:fixed;top:0;left:0;z-index:100; }
        .login-card { background:var(--bg2);border-radius:20px;padding:30px 24px;width:100%;max-width:380px;box-shadow:var(--shadow);text-align:center;border:1px solid var(--border); }
        .login-card h1 { font-size:28px;color:var(--accent);margin-bottom:4px; }
        .avatar-pick { width:70px;height:70px;border-radius:50%;background:var(--bg);color:var(--accent);display:inline-flex;align-items:center;justify-content:center;font-size:30px;cursor:pointer;margin-bottom:14px;overflow:hidden;border:2px solid var(--accent); }
        .avatar-pick img { width:100%;height:100%;border-radius:50%;object-fit:cover; }
        .input-group { margin-bottom:12px;text-align:left; }
        .input-group label { display:block;font-size:12px;color:var(--text2);margin-bottom:4px; }
        .input-group input,.input-group textarea { width:100%;padding:12px;border:1px solid var(--border);border-radius:10px;font-size:14px;background:var(--input);color:var(--text);outline:none;-webkit-appearance:none;resize:none;font-family:inherit; }
        .input-group input:focus,.input-group textarea:focus { border-color:var(--accent); }
        .btn { width:100%;padding:13px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;background:var(--accent);color:#000;margin-top:6px; }
        .btn-outline { width:100%;padding:11px;border:1px solid var(--accent);border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;background:transparent;color:var(--accent);margin-top:6px; }
        .error-msg { color:#ff4444;font-size:12px;margin-top:8px;display:none; }
        .app { height:100vh;width:100vw;display:none;position:fixed;top:0;left:0; }
        @media(min-width:768px){ .app{display:none;flex-direction:row;max-width:1100px;height:94vh;margin:3vh auto;position:relative;border-radius:14px;overflow:hidden;border:1px solid var(--border);} }
        .sidebar { width:100%;height:100%;display:flex;flex-direction:column;background:var(--bg2); }
        @media(min-width:768px){ .sidebar{width:330px;min-width:330px;border-right:1px solid var(--border);} }
        .sidebar-header { padding:12px 14px;background:var(--header);border-bottom:1px solid var(--border);flex-shrink:0;position:relative; }
        .profile-row { display:flex;align-items:center;gap:8px;margin-bottom:8px; }
        .my-avatar { width:36px;height:36px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:15px;overflow:hidden;font-weight:bold;color:#000;flex-shrink:0;cursor:pointer; }
        .my-avatar img { width:100%;height:100%;border-radius:50%;object-fit:cover; }
        .my-info { flex:1;min-width:0;cursor:pointer; }
        .my-name { font-weight:600;font-size:13px;color:var(--text); }
        .my-username { font-size:10px;color:var(--text2); }
        .icon-btn { background:var(--hover);border:none;color:var(--text);width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center; }
        .logout-btn { background:var(--hover);border:none;color:var(--text2);padding:4px 8px;border-radius:12px;font-size:10px;cursor:pointer; }
        .search-box { width:100%;padding:8px 12px;border:none;border-radius:16px;background:var(--input);color:var(--text);font-size:12px;outline:none; }
        .search-box::placeholder { color:var(--text2); }
        .theme-menu { display:none;position:absolute;top:50px;right:10px;background:var(--bg2);border-radius:12px;box-shadow:var(--shadow);z-index:999;overflow-y:auto;max-height:350px;border:1px solid var(--border); }
        .theme-menu.active { display:block; }
        .theme-menu div { padding:9px 14px;cursor:pointer;font-size:12px;color:var(--text);white-space:nowrap; }
        .theme-menu div:hover { background:var(--hover); }
        .users-list { flex:1;overflow-y:auto; }
        .section-title { padding:8px 14px 4px;font-size:10px;text-transform:uppercase;color:var(--text2);letter-spacing:1px;font-weight:700; }
        .user-item { display:flex;align-items:center;padding:10px 14px;cursor:pointer;gap:8px; }
        .user-item:active { background:var(--hover); }
        .user-item.selected { background:var(--hover);border-left:2px solid var(--accent); }
        .user-avatar { width:40px;height:40px;border-radius:50%;background:var(--accent);color:#000;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:16px;overflow:hidden;flex-shrink:0; }
        .user-info { flex:1;min-width:0; }
        .user-name { font-weight:600;font-size:13px; }
        .online-dot { width:8px;height:8px;border-radius:50%;background:var(--online);flex-shrink:0; }
        .chat-area { display:none;background:var(--chat-bg);height:100%; }
        @media(min-width:768px){ .chat-area{display:flex;flex-direction:column;flex:1;} }
        @media(max-width:767px){ .chat-area{position:fixed;top:0;left:0;right:0;bottom:0;z-index:50;display:none;flex-direction:column;} .chat-area.active{display:flex;} }
        .chat-header { padding:10px 14px;background:var(--header);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0; }
        .back-btn { display:none;background:none;border:none;font-size:18px;cursor:pointer;color:var(--accent); }
        @media(max-width:767px){ .back-btn{display:block;} }
        .chat-avatar { width:34px;height:34px;border-radius:50%;background:var(--accent);color:#000;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:14px;overflow:hidden;flex-shrink:0; }
        .chat-name { font-weight:600;font-size:13px; }
        .reply-bar { display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--header);border-top:1px solid var(--border);font-size:11px;color:var(--text2); }
        .reply-bar .reply-text { flex:1;color:var(--accent); }
        .reply-bar .reply-close { cursor:pointer; }
        .messages-container { flex:1;overflow-y:auto;padding:10px 12px; }
        .msg-row { display:flex;margin-bottom:3px;position:relative; }
        .msg-row.sent { justify-content:flex-end; }
        .msg-bubble { max-width:75%;padding:7px 12px;border-radius:16px;word-wrap:break-word;line-height:1.35;font-size:13px;position:relative;cursor:pointer; }
        .msg-row.sent .msg-bubble { background:var(--bubble-sent);color:var(--text);border-bottom-right-radius:4px; }
        .msg-row.received .msg-bubble { background:var(--bubble-rec);color:var(--text);border-bottom-left-radius:4px;border:1px solid var(--border); }
        .reply-preview { border-left:2px solid var(--accent);padding:2px 6px;margin-bottom:4px;font-size:11px;color:var(--accent); }
        .voice-bubble { display:flex;align-items:center;gap:8px;min-width:120px; }
        .voice-play { width:30px;height:30px;border-radius:50%;background:var(--accent);color:#000;border:none;font-size:13px;cursor:pointer;flex-shrink:0; }
        .voice-dur { font-size:10px;color:var(--text2); }
        .video-bubble { width:120px;height:120px;border-radius:50%;overflow:hidden;cursor:pointer;position:relative;background:#000;display:flex;align-items:center;justify-content:center; }
        .video-bubble video { width:100%;height:100%;object-fit:cover;border-radius:50%; }
        .video-bubble .play-overlay { position:absolute;font-size:28px;color:white;text-shadow:0 0 10px rgba(0,0,0,0.5);pointer-events:none; }
        .msg-menu { display:none;position:fixed;background:var(--bg2);border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,0.4);z-index:200;border:1px solid var(--border);overflow:hidden;min-width:140px; }
        .msg-menu.active { display:block; }
        .msg-menu div { padding:12px 16px;cursor:pointer;font-size:14px;color:var(--text); }
        .msg-menu div:hover { background:var(--hover); }
        .msg-menu div.danger { color:#ff4444; }
        .reactions-bar { display:flex;gap:3px;flex-wrap:wrap;margin-top:2px; }
        .reaction-item { background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:1px 5px;font-size:11px;cursor:pointer; }
        .reaction-item.active { background:var(--accent);color:#000; }
        .input-area { padding:8px 10px;background:var(--header);border-top:1px solid var(--border);display:flex;gap:6px;align-items:center;flex-shrink:0;padding-bottom:max(8px,env(safe-area-inset-bottom)); }
        .msg-input { flex:1;padding:9px 12px;border:none;border-radius:18px;font-size:13px;font-family:inherit;background:var(--input);color:var(--text);outline:none; }
        .voice-btn { width:34px;height:34px;border-radius:50%;background:var(--hover);color:var(--text2);border:none;cursor:pointer;font-size:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center; }
        .voice-btn.recording { background:#ff3333;color:white;animation:pulse 0.8s infinite; }
        .video-btn { width:34px;height:34px;border-radius:50%;background:var(--hover);color:var(--text2);border:none;cursor:pointer;font-size:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center; }
        .send-btn { width:34px;height:34px;border-radius:50%;background:var(--accent);color:#000;border:none;cursor:pointer;font-size:14px;flex-shrink:0; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
        .toast { position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--bg2);color:var(--text);padding:8px 16px;border-radius:16px;font-size:12px;z-index:999;border:1px solid var(--border);animation:fadeIn 0.3s;pointer-events:none; }
        @keyframes fadeIn { from{opacity:0;transform:translateX(-50%) translateY(10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
        .settings-modal { display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.5);z-index:250;align-items:center;justify-content:center; }
        .settings-modal.active { display:flex; }
        .settings-card { background:var(--bg2);border-radius:14px;padding:20px;width:90%;max-width:360px;max-height:80vh;overflow-y:auto;border:1px solid var(--border); }
        .settings-card h3 { font-size:17px;margin-bottom:14px;text-align:center;color:var(--text); }
        .forward-modal { display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.5);z-index:250;align-items:center;justify-content:center; }
        .forward-modal.active { display:flex; }
        .forward-card { background:var(--bg2);border-radius:14px;padding:16px;width:90%;max-width:300px;border:1px solid var(--border); }
        .forward-card h3 { font-size:15px;margin-bottom:10px;text-align:center;color:var(--text); }
        .forward-item { padding:10px;cursor:pointer;border-radius:8px;color:var(--text);font-size:13px; }
        .forward-item:hover { background:var(--hover); }
        .forward-cancel { width:100%;padding:10px;margin-top:8px;border:none;border-radius:8px;background:var(--input);color:var(--text);cursor:pointer; }
        .video-recording-screen { display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.9);z-index:300;flex-direction:column;align-items:center;justify-content:center; }
        .video-recording-screen.active { display:flex; }
        .video-recording-screen video { width:200px;height:200px;border-radius:50%;object-fit:cover;border:3px solid var(--accent); }
        .video-recording-screen .stop-btn { margin-top:20px;width:60px;height:60px;border-radius:50%;background:#ff3333;color:white;border:none;font-size:24px;cursor:pointer; }
    </style>
</head>
<body>
    <div class="snow-container" id="snowContainer"></div>
    <div class="login-screen" id="loginScreen">
        <div class="login-card">
            <h1>⚡ NeonMess</h1><p>Яркое общение</p>
            <div class="avatar-pick" id="loginAvatar" onclick="document.getElementById('avatarFile').click()">👤</div>
            <input type="file" id="avatarFile" accept="image/*" style="display:none" onchange="pickAvatar(event)">
            <div class="input-group"><label>Логин</label><input type="text" id="loginInput" placeholder="me" maxlength="15" autocomplete="off"></div>
            <div class="input-group"><label>Пароль</label><input type="password" id="passInput" placeholder="••••••" maxlength="20" autocomplete="off"></div>
            <button class="btn" onclick="doLogin()">🚀 Войти</button>
            <button class="btn-outline" onclick="toggleMode()">📝 Создать аккаунт</button>
            <div class="error-msg" id="loginError"></div>
        </div>
    </div>
    <div class="app" id="app">
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="profile-row">
                    <div class="my-avatar" id="myAvatarSmall" onclick="openSettings()">👤</div>
                    <div class="my-info" onclick="openSettings()">
                        <div class="my-name" id="myNameDisplay">Я</div>
                        <div class="my-username" id="myUsernameDisplay"></div>
                    </div>
                    <button class="icon-btn" id="themeBtn">🎨</button>
                    <button class="logout-btn" onclick="doLogout()">Выйти</button>
                </div>
                <div class="theme-menu" id="themeMenu">
                    <div onclick="setTheme('')">🟢 Стандарт</div><div onclick="setTheme('dark')">🌙 Тёмная</div><div onclick="setTheme('neon')">💚 Неон</div><div onclick="setTheme('purple')">💜 Фиолет</div><div onclick="setTheme('sunset')">🌅 Закат</div><div onclick="setTheme('ocean')">🌊 Океан</div><div onclick="setTheme('cyberpunk')">💛 Киберпанк</div><div onclick="setTheme('minecraft')">⛏️ Minecraft</div><div onclick="setTheme('pink')">💗 Розовый</div><div onclick="setTheme('drift')">🏎️ Дрифт</div><div onclick="setTheme('fairy')">🧚 Сказка</div><div onclick="setTheme('princess')">👑 Принцесса</div><div onclick="setTheme('boy')">👦 Бой</div><div onclick="setTheme('girl')">👧 Гёрл</div><div onclick="setTheme('tg')">💬 Telegram</div><div onclick="setTheme('tg-dark')">🌑 TG Тёмный</div>
                </div>
                <input type="text" class="search-box" placeholder="🔍 Поиск..." id="searchInput" oninput="filterUsers()">
            </div>
            <div class="users-list">
                <div class="section-title">Чаты</div>
                <div class="user-item" onclick="openChat('!saved')"><div class="user-avatar" style="background:#34c759;">💾</div><div class="user-info"><div class="user-name">Избранное</div></div></div>
                <div class="section-title">Контакты</div>
                <div id="usersOnline"></div>
            </div>
        </div>
        <div class="chat-area" id="chatArea">
            <div class="chat-header"><button class="back-btn" onclick="closeChat()">←</button><div class="chat-avatar" id="chatAvatar">💬</div><div><div class="chat-name" id="chatName">Чат</div></div></div>
            <div class="reply-bar" id="replyBar" style="display:none;"><span>↩</span><span class="reply-text" id="replyText"></span><span class="reply-close" onclick="cancelReply()">✕</span></div>
            <div class="messages-container" id="messagesContainer" onclick="closeAllMenus()"></div>
            <div class="input-area">
                <input type="text" class="msg-input" id="messageInput" placeholder="Сообщение..." onkeypress="if(event.key==='Enter'){sendMsg();}" autocomplete="off">
                <button class="voice-btn" id="voiceBtn" onmousedown="startVoice()" onmouseup="stopVoice()" ontouchstart="startVoice();event.preventDefault()" ontouchend="stopVoice()">🎤</button>
                <button class="video-btn" onclick="startVideo()">📹</button>
                <button class="send-btn" onclick="sendMsg()">➤</button>
            </div>
        </div>
    </div>
    <div class="settings-modal" id="settingsModal"><div class="settings-card"><h3>⚙️ Настройки</h3><div class="avatar-pick" id="settingsAvatar" onclick="document.getElementById('settingsAvatarInput').click()">👤</div><input type="file" id="settingsAvatarInput" accept="image/*" style="display:none" onchange="pickSettingsAvatar(event)"><p style="text-align:center;font-size:11px;color:var(--text2);margin-bottom:10px;">Нажми на аватар</p><div class="input-group"><label>Имя</label><input type="text" id="settingsName" maxlength="20"></div><div class="input-group"><label>Юзернейм (@)</label><input type="text" id="settingsUsername" maxlength="15"></div><div class="input-group"><label>Описание</label><textarea id="settingsBio" rows="2" maxlength="100"></textarea></div><button class="btn" onclick="saveSettings()">💾 Сохранить</button><button class="btn-outline" onclick="closeSettings()">Отмена</button></div></div>
    <div class="forward-modal" id="forwardModal"><div class="forward-card"><h3>Переслать в...</h3><div id="forwardList"></div><button class="forward-cancel" onclick="closeForward()">Отмена</button></div></div>
    <div class="video-recording-screen" id="videoScreen"><video id="videoPreview" autoplay muted playsinline></video><button class="stop-btn" id="stopVideoBtn">⬤</button></div>
    <script>
        var PUB="pub-c-e79dda66-e077-413a-ac73-e4d09bd67dfa",SUB="sub-c-f39c2da1-0f5e-4635-9f2a-18459534de30";
        var pn,me='',myAva='',myName='',myUsername='',myBio='',cur='',onl=[],msgs={},tmpAva='',reg=true,refInt,replyTo=null;
        var mr,ach=[],voiceRec=false,voiceStart=0,voiceStream=null;
        var videoRec=false,videoStream=null,videoMr=null,videoChunks=[];
        var REAC=['❤️','🔥','😂','😢','😮','👏'];

        function snow(){var c=document.getElementById('snowContainer');c.innerHTML='';for(var i=0;i<30;i++){var f=document.createElement('div');f.className='snowflake';f.textContent='❄';f.style.left=Math.random()*100+'%';f.style.fontSize=(Math.random()*14+6)+'px';f.style.animationDuration=(Math.random()*5+5)+'s';f.style.animationDelay=Math.random()*5+'s';c.appendChild(f);}}
        function setTheme(t){document.documentElement.setAttribute('data-theme',t);localStorage.setItem('nm_theme',t);document.getElementById('themeMenu').classList.remove('active');if(t===''||t==='minecraft')snow();else document.getElementById('snowContainer').innerHTML='';}
        setTheme(localStorage.getItem('nm_theme')||'');if(localStorage.getItem('nm_theme')===''||localStorage.getItem('nm_theme')==='minecraft')snow();
        document.addEventListener('click',function(e){if(!e.target.closest('#themeBtn')&&!e.target.closest('#themeMenu'))document.getElementById('themeMenu').classList.remove('active');});
        document.getElementById('themeBtn').addEventListener('click',function(e){e.stopPropagation();document.getElementById('themeMenu').classList.toggle('active');});

        function openSettings(){document.getElementById('settingsName').value=myName||me;document.getElementById('settingsUsername').value=myUsername||'';document.getElementById('settingsBio').value=myBio||'';document.getElementById('settingsAvatar').innerHTML=myAva?'<img src="'+myAva+'">':'👤';document.getElementById('settingsModal').classList.add('active');}
        function closeSettings(){document.getElementById('settingsModal').classList.remove('active');}
        function pickSettingsAvatar(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){myAva=ev.target.result;document.getElementById('settingsAvatar').innerHTML='<img src="'+myAva+'">';document.getElementById('myAvatarSmall').innerHTML='<img src="'+myAva+'">';localStorage.setItem('nm_ava',myAva);};r.readAsDataURL(f);}
        function saveSettings(){myName=document.getElementById('settingsName').value.trim()||me;myUsername=document.getElementById('settingsUsername').value.trim();myBio=document.getElementById('settingsBio').value.trim();document.getElementById('myNameDisplay').textContent=myName;document.getElementById('myUsernameDisplay').textContent=myUsername?'@'+myUsername:'';localStorage.setItem('nm_name',myName);localStorage.setItem('nm_uname',myUsername);localStorage.setItem('nm_bio',myBio);closeSettings();toast('✅ Сохранено!');}
        function pickAvatar(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){tmpAva=ev.target.result;document.getElementById('loginAvatar').innerHTML='<img src="'+tmpAva+'">';};r.readAsDataURL(f);}
        function toggleMode(){reg=!reg;document.querySelector('.btn-outline').textContent=reg?'📝 Создать аккаунт':'🔑 Уже есть аккаунт';}
        function hash(s){return CryptoJS.SHA256(s).toString();}
        function doLogin(){var l=document.getElementById('loginInput').value.trim(),p=document.getElementById('passInput').value.trim();if(!l||l.length<2){err('Логин минимум 2 символа');return;}if(!p||p.length<3){err('Пароль минимум 3 символа');return;}var hp=hash(p),sp=localStorage.getItem('nm_'+l);if(reg){if(sp){err('Логин занят!');return;}localStorage.setItem('nm_'+l,hp);}else{if(!sp){err('Аккаунт не найден');return;}if(sp!==hp){err('Неверный пароль');return;}}me=l;myAva=tmpAva;myName=localStorage.getItem('nm_name')||me;myUsername=localStorage.getItem('nm_uname')||'';myBio=localStorage.getItem('nm_bio')||'';document.getElementById('loginScreen').style.display='none';var app=document.getElementById('app');app.style.display='block';if(window.innerWidth>=768)app.style.display='flex';document.getElementById('myAvatarSmall').innerHTML=myAva?'<img src="'+myAva+'">':me.charAt(0).toUpperCase();document.getElementById('myNameDisplay').textContent=myName;document.getElementById('myUsernameDisplay').textContent=myUsername?'@'+myUsername:'';load();initPN();localStorage.setItem('nm_user',me);if(myAva)localStorage.setItem('nm_ava',myAva);}
        function err(m){var e=document.getElementById('loginError');e.textContent=m;e.style.display='block';setTimeout(function(){e.style.display='none';},3000);}
        function toast(m){var o=document.querySelector('.toast');if(o)o.remove();var t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(function(){t.remove();},2000);}

        function initPN(){if(pn){pn.unsubscribeAll();}pn=new PubNub({publishKey:PUB,subscribeKey:SUB,uuid:me});pn.addListener({message:function(e){var m=e.message;if(m.type==='on'){if(m.u!==me&&onl.indexOf(m.u)===-1){onl.push(m.u);renderUsers();}return;}if(m.type==='who'){pn.publish({channel:'neonmess',message:{type:'on',u:me}});return;}if(m.type==='delete_msg'){if(msgs[cur]){msgs[cur]=msgs[cur].filter(function(x){return x.id!==m.id;});save();renderMsgs();}return;}if(m.type==='msg'||m.type==='voice'||m.type==='video'||m.type==='reply'||m.type==='forward'||m.type==='reaction'){var key=m.to===me?m.from:(m.from===me?m.to:null);if(!key)return;if(!msgs[key])msgs[key]=[];var ex=-1;for(var i=0;i<msgs[key].length;i++){if(msgs[key][i].id===m.id){ex=i;break;}}if(ex!==-1)msgs[key][ex]=m;else msgs[key].push(m);save();if(cur===key)renderMsgs();renderUsers();}}});pn.subscribe({channels:['neonmess']});setTimeout(function(){pn.publish({channel:'neonmess',message:{type:'on',u:me}});},300);setTimeout(function(){pn.publish({channel:'neonmess',message:{type:'who'}});},800);if(refInt)clearInterval(refInt);refInt=setInterval(function(){pn.publish({channel:'neonmess',message:{type:'who'}});pn.publish({channel:'neonmess',message:{type:'on',u:me}});},5000);}
        function sendMsg(){if(!cur||!pn)return;var t=document.getElementById('messageInput').value.trim();if(!t)return;var m={id:Date.now().toString(),type:replyTo?'reply':'msg',from:me,to:cur,text:t,t:new Date().toISOString()};if(replyTo){m.replyTo=replyTo.id;m.replyText=replyTo.text;m.replyFrom=replyTo.from;}pn.publish({channel:'neonmess',message:m});if(!msgs[cur])msgs[cur]=[];msgs[cur].push(m);save();renderMsgs();document.getElementById('messageInput').value='';cancelReply();}
        async function startVoice(){if(voiceRec)return;try{voiceStream=await navigator.mediaDevices.getUserMedia({audio:true});mr=new MediaRecorder(voiceStream);ach=[];voiceStart=Date.now();mr.ondataavailable=function(e){if(e.data.size>0)ach.push(e.data);};mr.onstop=function(){var dur=Math.round((Date.now()-voiceStart)/1000);var b=new Blob(ach,{type:'audio/webm'});var r=new FileReader();r.onload=function(ev){sendVoice(ev.target.result,dur);};r.readAsDataURL(b);voiceStream.getTracks().forEach(function(t){t.stop();});voiceStream=null;};mr.start(100);voiceRec=true;document.getElementById('voiceBtn').classList.add('recording');document.getElementById('voiceBtn').textContent='⏹';}catch(e){toast('❌ Нет микрофона');}}
        function stopVoice(){if(!voiceRec||!mr)return;mr.stop();voiceRec=false;document.getElementById('voiceBtn').classList.remove('recording');document.getElementById('voiceBtn').textContent='🎤';}
        function sendVoice(data,dur){if(!cur||!pn)return;var m={id:Date.now().toString(),type:'voice',from:me,to:cur,audio:data,dur:dur,t:new Date().toISOString()};pn.publish({channel:'neonmess',message:m});if(!msgs[cur])msgs[cur]=[];msgs[cur].push(m);save();renderMsgs();}
        async function startVideo(){try{videoStream=await navigator.mediaDevices.getUserMedia({video:{width:480,height:480,facingMode:'user'},audio:true});document.getElementById('videoScreen').classList.add('active');document.getElementById('videoPreview').srcObject=videoStream;videoChunks=[];videoRec=true;videoMr=new MediaRecorder(videoStream);videoMr.ondataavailable=function(e){if(e.data.size>0)videoChunks.push(e.data);};videoMr.onstop=function(){var b=new Blob(videoChunks,{type:'video/webm'});var r=new FileReader();r.onload=function(ev){sendVideo(ev.target.result);};r.readAsDataURL(b);videoStream.getTracks().forEach(function(t){t.stop();});document.getElementById('videoScreen').classList.remove('active');};videoMr.start(100);document.getElementById('stopVideoBtn').onclick=function(){stopVideo();};setTimeout(function(){if(videoRec)stopVideo();},30000);}catch(e){toast('❌ Нет камеры');}}
        function stopVideo(){if(!videoRec||!videoMr)return;videoMr.stop();videoRec=false;}
        function sendVideo(data){if(!cur||!pn)return;var m={id:Date.now().toString(),type:'video',from:me,to:cur,video:data,t:new Date().toISOString()};pn.publish({channel:'neonmess',message:m});if(!msgs[cur])msgs[cur]=[];msgs[cur].push(m);save();renderMsgs();}

        function showMsgMenu(e,msgId){e.stopPropagation();closeAllMenus();var menu=document.getElementById('menu-'+msgId);if(menu){menu.classList.toggle('active');menu.style.top=Math.min(e.clientY,window.innerHeight-200)+'px';menu.style.left=Math.min(e.clientX-120,window.innerWidth-160)+'px';}}
        function closeAllMenus(){document.querySelectorAll('.msg-menu').forEach(function(m){m.classList.remove('active');});}
        function deleteMsg(msgId){if(!cur||!pn)return;msgs[cur]=msgs[cur].filter(function(m){return m.id!==msgId;});save();renderMsgs();closeAllMenus();pn.publish({channel:'neonmess',message:{type:'delete_msg',id:msgId,from:me,to:cur}});}
        function replyMsg(msgId){var ml=msgs[cur];if(!ml)return;var m=null;for(var i=0;i<ml.length;i++){if(ml[i].id===msgId){m=ml[i];break;}}if(!m)return;replyTo=m;document.getElementById('replyBar').style.display='flex';document.getElementById('replyText').textContent=(m.text||'🎤 ГС').substring(0,40);document.getElementById('messageInput').focus();closeAllMenus();}
        function cancelReply(){replyTo=null;document.getElementById('replyBar').style.display='none';}
        function forwardMsg(msgId){var ml=msgs[cur];if(!ml)return;var m=null;for(var i=0;i<ml.length;i++){if(ml[i].id===msgId){m=ml[i];break;}}if(!m)return;closeAllMenus();openForward(m);}
        function openForward(m){var fl=document.getElementById('forwardList');var h='';onl.forEach(function(u){if(u!==me)h+='<div class="forward-item" onclick="doForward(\''+u+'\',\''+m.id+'\')">👤 '+u+'</div>';});fl.innerHTML=h||'<div style="color:var(--text2);text-align:center;">Никого онлайн</div>';document.getElementById('forwardModal').classList.add('active');window._fwdMsg=m;}
        function closeForward(){document.getElementById('forwardModal').classList.remove('active');}
        function doForward(to,msgId){var m=window._fwdMsg;if(!m||!pn)return;var m2={id:Date.now().toString(),type:'forward',from:me,to:to,text:'↪ '+m.text||'',video:m.video||'',audio:m.audio||'',dur:m.dur||0,t:new Date().toISOString()};pn.publish({channel:'neonmess',message:m2});if(!msgs[to])msgs[to]=[];msgs[to].push(m2);save();closeForward();toast('Переслано!');}
        function addReaction(id,em){if(!cur||!pn)return;var ml=msgs[cur];if(!ml)return;var m=null;for(var i=0;i<ml.length;i++){if(ml[i].id===id){m=ml[i];break;}}if(!m)return;if(!m.reactions)m.reactions={};if(!m.reactions[em])m.reactions[em]=[];var idx=m.reactions[em].indexOf(me);if(idx!==-1){m.reactions[em].splice(idx,1);if(m.reactions[em].length===0)delete m.reactions[em];}else m.reactions[em].push(me);m.type='reaction';pn.publish({channel:'neonmess',message:m});save();renderMsgs();closeAllMenus();}

        function addMsgDOM(m){var c=document.getElementById('messagesContainer'),r=document.createElement('div');r.className='msg-row '+(m.from===me?'sent':'received');r.id='msg-'+m.id;var ct='';if(m.type==='voice'){ct='<div class="voice-bubble"><button class="voice-play" id="vbtn-'+m.id+'" onclick="playVoice(\''+m.id+'\');event.stopPropagation();">▶</button><span class="voice-dur">'+(m.dur||0)+'с</span></div>';window['aud_'+m.id]=m.audio;}else if(m.type==='video'){ct='<div class="video-bubble" onclick="playVideoMsg(\''+m.id+'\');event.stopPropagation();"><video id="vid-'+m.id+'" src="'+m.video+'" loop playsinline style="display:none;"></video><div class="play-overlay">▶</div></div>';}else{var rpH='';if(m.replyTo){rpH='<div class="reply-preview">↩ '+(m.replyText||'').substring(0,30)+'</div>';}ct=rpH+(m.text||'');}var rh='';if(m.reactions&&Object.keys(m.reactions).length>0){rh='<div class="reactions-bar">';var ks=Object.keys(m.reactions);for(var k=0;k<ks.length;k++){var e=ks[k],u=m.reactions[e];rh+='<span class="reaction-item'+(u.indexOf(me)!==-1?' active':'')+'" onclick="addReaction(\''+m.id+'\',\''+e+'\');event.stopPropagation();">'+e+' '+u.length+'</span>';}rh+='</div>';}var menuHTML='<div class="msg-menu" id="menu-'+m.id+'"><div onclick="replyMsg(\''+m.id+'\')">↩ Ответить</div><div onclick="forwardMsg(\''+m.id+'\')">↪ Переслать</div>';if(m.from===me){menuHTML+='<div class="danger" onclick="deleteMsg(\''+m.id+'\')">🗑 Удалить</div>';}menuHTML+='</div>';r.innerHTML='<div class="msg-bubble" oncontextmenu="showMsgMenu(event,\''+m.id+'\');" ontouchstart="window._touchTimer=setTimeout(function(){showMsgMenu(event,\''+m.id+'\');},500);" ontouchend="clearTimeout(window._touchTimer);" ontouchmove="clearTimeout(window._touchTimer);">'+ct+'</div>'+rh+menuHTML;c.appendChild(r);c.scrollTop=c.scrollHeight;}
        function playVoice(id){var d=window['aud_'+id];if(!d)return;var a=new Audio(d);var btn=document.getElementById('vbtn-'+id);a.onplay=function(){if(btn)btn.textContent='⏸';};a.onended=function(){if(btn)btn.textContent='▶';};a.play().catch(function(){toast('❌ Ошибка');});}
        function playVideoMsg(id){var v=document.getElementById('vid-'+id);if(!v)return;var overlay=v.parentElement.querySelector('.play-overlay');if(v.paused){v.style.display='block';v.play();if(overlay)overlay.style.display='none';}else{v.pause();v.style.display='none';if(overlay)overlay.style.display='block';}}
        function renderMsgs(){var c=document.getElementById('messagesContainer');c.innerHTML='';var ml=msgs[cur]||[];if(ml.length===0){c.innerHTML='<div style="text-align:center;color:var(--text2);padding:40px;font-size:13px;">Нет сообщений</div>';return;}ml.forEach(function(m){addMsgDOM(m);});}
        function openChat(u){cur=u;if(!msgs[cur])msgs[cur]=[];document.getElementById('chatAvatar').textContent=u.charAt(0).toUpperCase();document.getElementById('chatName').textContent=u;document.getElementById('chatArea').classList.add('active');renderMsgs();renderUsers();cancelReply();setTimeout(function(){document.getElementById('messageInput').focus();},200);}
        function closeChat(){cur=null;document.getElementById('chatArea').classList.remove('active');renderUsers();}
        function renderUsers(){var o=onl.filter(function(u){return u!==me;});var h='';if(o.length===0){h='<div style="padding:16px;color:var(--text2);text-align:center;font-size:12px;">Никого онлайн</div>';}else{o.forEach(function(u){var s=cur===u?' selected':'';h+='<div class="user-item'+s+'" onclick="openChat(\''+u+'\')"><div class="user-avatar">'+u.charAt(0).toUpperCase()+'</div><div class="user-info"><div class="user-name">'+u+'</div></div><div class="online-dot"></div></div>';});}document.getElementById('usersOnline').innerHTML=h;}
        function filterUsers(){var q=document.getElementById('searchInput').value.toLowerCase();document.querySelectorAll('#usersOnline .user-item').forEach(function(el){var n=(el.querySelector('.user-name')||{}).textContent||'';el.style.display=n.toLowerCase().indexOf(q)!==-1?'flex':'none';});}
        function doLogout(){if(pn){pn.unsubscribeAll();pn=null;}if(refInt){clearInterval(refInt);refInt=null;}me='';cur=null;onl=[];msgs={};document.getElementById('loginScreen').style.display='flex';document.getElementById('app').style.display='none';}
        function save(){try{var d={};Object.keys(msgs).forEach(function(k){d[k]=msgs[k].slice(-500);});localStorage.setItem('nm_msgs_'+me,JSON.stringify(d));}catch(e){}}
        function load(){var s=localStorage.getItem('nm_msgs_'+me);if(s){try{msgs=JSON.parse(s);}catch(e){msgs={};}}}

        var su=localStorage.getItem('nm_user'),sa=localStorage.getItem('nm_ava');
        if(su){me=su;myAva=sa||'';myName=localStorage.getItem('nm_name')||me;myUsername=localStorage.getItem('nm_uname')||'';document.getElementById('loginInput').value=su;if(sa){document.getElementById('loginAvatar').innerHTML='<img src="'+sa+'">';tmpAva=sa;}document.getElementById('passInput').placeholder='Пароль';reg=false;document.querySelector('.btn-outline').textContent='🔑 Уже есть аккаунт';}
    </script>
</body>
</html>
