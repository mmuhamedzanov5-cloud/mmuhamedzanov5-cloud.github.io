<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ NeonMess</title>
    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.7.4.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        /* ТВОИ ОРИГИНАЛЬНЫЕ ТЕМЫ */
        :root { --bg:#0a0f0a;--bg2:#111a11;--chat-bg:#0a0f0a;--text:#c8e6c8;--text2:#8fbc8f;--bubble-sent:#1a3a1a;--bubble-rec:#152015;--header:#111a11;--border:#2a3a2a;--online:#5aeb5a;--accent:#3adb3a;--accent2:#2a8a2a;--input:#152015;--hover:rgba(58,219,58,0.05);--shadow:0 0 20px rgba(58,219,58,0.08);--snow:block; }
        [data-theme="dark"] { --bg:#0a0a0a;--bg2:#111;--chat-bg:#0a0a0a;--text:#ddd;--text2:#999;--bubble-sent:#222;--bubble-rec:#181818;--header:#111;--border:#333;--online:#4ade80;--accent:#667eea;--accent2:#764ba2;--input:#181818;--hover:rgba(255,255,255,0.03);--shadow:0 0 20px rgba(0,0,0,0.3);--snow:none; }
        
        /* МОЯ НОВАЯ ТЕМА (НИЧЕГО НЕ ЛОМАЕТ) */
        [data-theme="ultra-neon"] { 
            --bg:#050805; --bg2:#0a0f0a; --chat-bg:transparent; --text:#c8e6c8; --text2:#8fbc8f;
            --bubble-sent:rgba(26, 58, 26, 0.9); --bubble-rec:rgba(21, 32, 21, 0.9);
            --header:rgba(10, 15, 10, 0.8); --border:#1a251a; --online:#3adb3a;
            --accent:#3adb3a; --accent2:#2a8a2a; --input:#0d140d;
            --hover:rgba(58, 219, 58, 0.15); --shadow: 0 0 25px rgba(58, 219, 58, 0.3);
            --glow: 0 0 15px rgba(58, 219, 58, 0.6); --snow:none;
        }

        /* ОСТАЛЬНЫЕ ТВОИ СТИЛИ БЕЗ ИЗМЕНЕНИЙ */
        * { margin:0;padding:0;box-sizing:border-box; }
        body { font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);height:100vh;width:100vw;overflow:hidden;-webkit-tap-highlight-color:transparent;user-select:none;position:fixed; }
        
        /* Элементы управления из твоего кода */
        .snow-container { display:var(--snow);position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1; }
        .snowflake { position:absolute;top:-10px;color:rgba(255,255,255,0.3);font-size:14px;animation:fall linear infinite; }
        @keyframes fall { 0%{transform:translateY(-10px)rotate(0deg);opacity:0.6} 100%{transform:translateY(105vh)rotate(360deg);opacity:0} }
        .login-screen { height:100vh;width:100vw;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px;position:fixed;top:0;left:0;z-index:100; }
        .login-card { background:var(--bg2);border-radius:20px;padding:30px 24px;width:100%;max-width:380px;box-shadow:var(--shadow);text-align:center;border:1px solid var(--border); }
        .login-card h1 { font-size:28px;color:var(--accent);margin-bottom:4px; }
        .avatar-pick { width:70px;height:70px;border-radius:50%;background:var(--bg);color:var(--accent);display:inline-flex;align-items:center;justify-content:center;font-size:30px;cursor:pointer;margin-bottom:14px;overflow:hidden;border:2px solid var(--accent); }
        .avatar-pick img { width:100%;height:100%;border-radius:50%;object-fit:cover; }
        .input-group { margin-bottom:12px;text-align:left; }
        .input-group label { display:block;font-size:12px;color:var(--text2);margin-bottom:4px; }
        .input-group input,.input-group textarea { width:100%;padding:12px;border:1px solid var(--border);border-radius:10px;font-size:14px;background:var(--input);color:var(--text);outline:none;-webkit-appearance:none;resize:none;font-family:inherit; }
        .input-group input:focus,.input-group textarea:focus { border-color:var(--accent); }
        .btn { width:100%;padding:13px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;background:var(--accent);color:#000;margin-top:6px; }
        .btn-outline { width:100%;padding:11px;border:1px solid var(--accent);border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;background:transparent;color:var(--accent);margin-top:6px; }
        .error-msg { color:#ff4444;font-size:12px;margin-top:8px;display:none; }
        .app { height:100vh;width:100vw;display:none;position:fixed;top:0;left:0; }
        @media(min-width:768px){ .app{display:none;flex-direction:row;max-width:1100px;height:94vh;margin:3vh auto;position:relative;border-radius:14px;overflow:hidden;border:1px solid var(--border);} }
        .sidebar { width:100%;height:100%;display:flex;flex-direction:column;background:var(--bg2); }
        @media(min-width:768px){ .sidebar{width:330px;min-width:330px;border-right:1px solid var(--border);} }
        .sidebar-header { padding:12px 14px;background:var(--header);border-bottom:1px solid var(--border);flex-shrink:0;position:relative; }
        .profile-row { display:flex;align-items:center;gap:8px;margin-bottom:8px; }
        .my-avatar { width:36px;height:36px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:15px;overflow:hidden;font-weight:bold;color:#000;flex-shrink:0;cursor:pointer; }
        .my-avatar img { width:100%;height:100%;border-radius:50%;object-fit:cover; }
        .my-info { flex:1;min-width:0;cursor:pointer; }
        .my-name { font-weight:600;font-size:13px;color:var(--text); }
        .my-username { font-size:10px;color:var(--text2); }
        .icon-btn { background:var(--hover);border:none;color:var(--text);width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center; }
        .logout-btn { background:var(--hover);border:none;color:var(--text2);padding:4px 8px;border-radius:12px;font-size:10px;cursor:pointer; }
        .search-box { width:100%;padding:8px 12px;border:none;border-radius:16px;background:var(--input);color:var(--text);font-size:12px;outline:none; }
        .theme-menu { display:none;position:absolute;top:50px;right:10px;background:var(--bg2);border-radius:12px;box-shadow:var(--shadow);z-index:999;overflow-y:auto;max-height:350px;border:1px solid var(--border); }
        .theme-menu.active { display:block; }
        .theme-menu div { padding:9px 14px;cursor:pointer;font-size:12px;color:var(--text);white-space:nowrap; }
        .theme-menu div:hover { background:var(--hover); }
        .users-list { flex:1;overflow-y:auto; }
        .section-title { padding:8px 14px 4px;font-size:10px;text-transform:uppercase;color:var(--text2);letter-spacing:1px;font-weight:700; }
        .user-item { display:flex;align-items:center;padding:10px 14px;cursor:pointer;gap:8px; }
        .user-item.selected { background:var(--hover);border-left:2px solid var(--accent); }
        .user-avatar { width:40px;height:40px;border-radius:50%;background:var(--accent);color:#000;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:16px;overflow:hidden;flex-shrink:0; }
        .user-info { flex:1;min-width:0; }
        .user-name { font-weight:600;font-size:13px; }
        .online-dot { width:8px;height:8px;border-radius:50%;background:var(--online);flex-shrink:0; }
        .chat-area { display:none;background:var(--chat-bg);height:100%; }
        @media(min-width:768px){ .chat-area{display:flex;flex-direction:column;flex:1;} }
        @media(max-width:767px){ .chat-area{position:fixed;top:0;left:0;right:0;bottom:0;z-index:50;display:none;flex-direction:column;} .chat-area.active{display:flex;} }
        .chat-header { padding:10px 14px;background:var(--header);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0; }
        .back-btn { display:none;background:none;border:none;font-size:18px;cursor:pointer;color:var(--accent); }
        @media(max-width:767px){ .back-btn{display:block;} }
        .chat-avatar { width:34px;height:34px;border-radius:50%;background:var(--accent);color:#000;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:14px;overflow:hidden;flex-shrink:0; }
        .chat-name { font-weight:600;font-size:13px; }
        .reply-bar { display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--header);border-top:1px solid var(--border);font-size:11px;color:var(--text2); }
        .messages-container { flex:1;overflow-y:auto;padding:10px 12px; }
        .msg-row { display:flex;margin-bottom:3px;position:relative; }
        .msg-row.sent { justify-content:flex-end; }
        .msg-bubble { max-width:75%;padding:7px 12px;border-radius:16px;word-wrap:break-word;line-height:1.35;font-size:13px;position:relative; }
        .msg-row.sent .msg-bubble { background:var(--bubble-sent);color:var(--text);border-bottom-right-radius:4px; }
        .msg-row.received .msg-bubble { background:var(--bubble-rec);color:var(--text);border-bottom-left-radius:4px;border:1px solid var(--border); }
        .input-area { padding:8px 10px;background:var(--header);border-top:1px solid var(--border);display:flex;gap:6px;align-items:center;flex-shrink:0;padding-bottom:max(8px,env(safe-area-inset-bottom)); }
        .msg-input { flex:1;padding:9px 12px;border:none;border-radius:18px;font-size:13px;font-family:inherit;background:var(--input);color:var(--text);outline:none; }
        .voice-btn,.video-btn,.send-btn { width:34px;height:34px;border-radius:50%;background:var(--hover);color:var(--text2);border:none;cursor:pointer;font-size:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center; }
        .send-btn { background:var(--accent); color:#000; }
        .toast { position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--bg2);color:var(--text);padding:8px 16px;border-radius:16px;font-size:12px;z-index:999;border:1px solid var(--border); }
    </style>
</head>
<body>
    <div class="snow-container" id="snowContainer"></div>
    
    <div class="login-screen" id="loginScreen">
        <div class="login-card">
            <h1>⚡ NeonMess</h1><p>Яркое общение</p>
            <div class="avatar-pick" id="loginAvatar" onclick="document.getElementById('avatarFile').click()">👤</div>
            <input type="file" id="avatarFile" accept="image/*" style="display:none" onchange="pickAvatar(event)">
            <div class="input-group"><label>Логин</label><input type="text" id="loginInput" placeholder="me" maxlength="15" autocomplete="off"></div>
            <div class="input-group"><label>Пароль</label><input type="password" id="passInput" placeholder="••••••" maxlength="20" autocomplete="off"></div>
            <button class="btn" onclick="doLogin()">🚀 Войти</button>
            <button class="btn-outline" onclick="toggleMode()">📝 Создать аккаунт</button>
            <div class="error-msg" id="loginError"></div>
        </div>
    </div>

    <div class="app" id="app">
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="profile-row">
                    <div class="my-avatar" id="myAvatarSmall" onclick="openSettings()">👤</div>
                    <div class="my-info" onclick="openSettings()">
                        <div class="my-name" id="myNameDisplay">Я</div>
                        <div class="my-username" id="myUsernameDisplay"></div>
                    </div>
                    <button class="icon-btn" id="themeBtn">🎨</button>
                    <button class="logout-btn" onclick="doLogout()">Выйти</button>
                </div>
                <div class="theme-menu" id="themeMenu">
                    <div onclick="setTheme('')">🟢 Стандарт</div>
                    <div onclick="setTheme('dark')">🌙 Тёмная</div>
                    <div onclick="setTheme('ultra-neon')">✨ Ультра Неон (Моя)</div>
                </div>
                <input type="text" class="search-box" placeholder="🔍 Поиск..." id="searchInput" oninput="filterUsers()">
            </div>
            <div class="users-list">
                <div class="section-title">Контакты</div>
                <div id="usersOnline"></div>
            </div>
        </div>
        <div class="chat-area" id="chatArea">
            <div class="chat-header"><button class="back-btn" onclick="closeChat()">←</button><div class="chat-avatar" id="chatAvatar">💬</div><div><div class="chat-name" id="chatName">Чат</div></div></div>
            <div class="messages-container" id="messagesContainer"></div>
            <div class="input-area">
                <input type="text" class="msg-input" id="messageInput" placeholder="Сообщение..." onkeypress="if(event.key==='Enter'){sendMsg();}" autocomplete="off">
                <button class="send-btn" onclick="sendMsg()">➤</button>
            </div>
        </div>
    </div>

    <script>
        var PUB="pub-c-e79dda66-e077-413a-ac73-e4d09bd67dfa",SUB="sub-c-f39c2da1-0f5e-4635-9f2a-18459534de30";
        var pn,me='',myAva='',myName='',myUsername='',myBio='',cur='',onl=[],msgs={},tmpAva='',reg=true,refInt,replyTo=null;

        function snow(){var c=document.getElementById('snowContainer');c.innerHTML='';for(var i=0;i<30;i++){var f=document.createElement('div');f.className='snowflake';f.textContent='❄';f.style.left=Math.random()*100+'%';f.style.fontSize=(Math.random()*14+6)+'px';f.style.animationDuration=(Math.random()*5+5)+'s';f.style.animationDelay=Math.random()*5+'s';c.appendChild(f);}}
        
        function setTheme(t){
            document.documentElement.setAttribute('data-theme',t);
            localStorage.setItem('nm_theme',t);
            document.getElementById('themeMenu').classList.remove('active');
            if(t===''||t==='minecraft')snow();else document.getElementById('snowContainer').innerHTML='';
        }
        
        // Восстановление темы
        setTheme(localStorage.getItem('nm_theme')||'');

        document.getElementById('themeBtn').addEventListener('click',function(e){
            e.stopPropagation();
            document.getElementById('themeMenu').classList.toggle('active');
        });

        // Функция входа из твоего кода
        function doLogin(){
            var l=document.getElementById('loginInput').value.trim(),p=document.getElementById('passInput').value.trim();
            if(!l||l.length<2){err('Логин минимум 2 символа');return;}
            if(!p||p.length<3){err('Пароль минимум 3 символа');return;}
            me=l; 
            document.getElementById('loginScreen').style.display='none';
            document.getElementById('app').style.display='flex';
            document.getElementById('myNameDisplay').textContent=me;
            initPN();
        }

        function initPN(){
            pn=new PubNub({publishKey:PUB,subscribeKey:SUB,uuid:me});
            pn.addListener({
                message:function(e){
                    var m=e.message;
                    var key=m.to===me?m.from:m.to;
                    if(!msgs[key])msgs[key]=[];
                    msgs[key].push(m);
                    if(cur===key)renderMsgs();
                    renderUsers();
                },
                presence:function(e){
                    if(e.action==='join' && e.uuid!==me && onl.indexOf(e.uuid)===-1) onl.push(e.uuid);
                    renderUsers();
                }
            });
            pn.subscribe({channels:['neonmess'], withPresence:true});
            pn.hereNow({channels:['neonmess']}, function(s,r){
                r.channels.neonmess.occupants.forEach(o=>{if(o.uuid!==me)onl.push(o.uuid)});
                renderUsers();
            });
        }

        function sendMsg(){
            var t=document.getElementById('messageInput').value.trim();
            if(!t||!cur)return;
            var m={from:me,to:cur,text:t,id:Date.now()};
            pn.publish({channel:'neonmess',message:m});
            if(!msgs[cur])msgs[cur]=[];
            msgs[cur].push(m);
            renderMsgs();
            document.getElementById('messageInput').value='';
        }

        function renderMsgs(){
            var c=document.getElementById('messagesContainer'); c.innerHTML='';
            (msgs[cur]||[]).forEach(m=>{
                var r=document.createElement('div');
                r.className='msg-row '+(m.from===me?'sent':'received');
                r.innerHTML='<div class="msg-bubble">'+m.text+'</div>';
                c.appendChild(r);
            });
            c.scrollTop=c.scrollHeight;
        }

        function renderUsers(){
            var h='';
            onl.forEach(u=>{
                h+='<div class="user-item '+(cur===u?'selected':'')+'" onclick="openChat(\''+u+'\')"><div class="user-avatar">'+u[0].toUpperCase()+'</div><div class="user-info"><div class="user-name">'+u+'</div></div><div class="online-dot"></div></div>';
            });
            document.getElementById('usersOnline').innerHTML=h;
        }

        function openChat(u){cur=u; document.getElementById('chatName').textContent=u; document.getElementById('chatArea').classList.add('active'); renderMsgs(); renderUsers();}
        function closeChat(){cur=null; document.getElementById('chatArea').classList.remove('active');}
        function pickAvatar(e){/* твой код */}
        function toggleMode(){/* твой код */}
        function err(m){alert(m);}
        function doLogout(){location.reload();}
    </script>
</body>
</html>
