<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ NeonMess Ultra Max</title>
    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.7.4.0.min.js"></script>
    <style>
        :root { 
            --bg:#050805; --bg2:#0a0f0a; --text:#c8e6c8; --border:#1a251a; 
            --accent:#3adb3a; --input:#0d140d; --bubble-sent:#1a3a1a; --bubble-rec:#121a12;
            --shadow: 0 0 25px rgba(58, 219, 58, 0.15); 
            --glow: 0 0 15px rgba(58, 219, 58, 0.6);
        }
        [data-theme="blue"] {
            --bg:#050508; --bg2:#0a0a0f; --text:#c8dae6; --border:#1a1a25; 
            --accent:#3a8edb; --input:#0d0d14; --bubble-sent:#1a2a3a; --bubble-rec:#12121a;
            --shadow: 0 0 25px rgba(58, 142, 219, 0.15); 
            --glow: 0 0 15px rgba(58, 142, 219, 0.6);
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
        body { background:var(--bg); color:var(--text); height:100vh; overflow:hidden; }
        
        /* ТЕ САМЫЕ СВЕТЯШКИ */
        #bg-canvas { position: fixed; inset: 0; z-index: -1; pointer-events: none; }

        #app { display:none; height:100vh; width:100vw; display:flex; position: relative; z-index: 1; }
        .sidebar { width:280px; border-right:1px solid var(--border); background:rgba(10, 15, 10, 0.8); backdrop-filter: blur(10px); display:flex; flex-direction:column; box-shadow: var(--shadow); }
        .chat-area { flex:1; display:flex; flex-direction:column; background: transparent; position: relative; }

        .side-header { padding:20px; border-bottom:1px solid var(--border); }
        .input-style { width:100%; padding:12px; border-radius:12px; border:1px solid var(--border); background:var(--input); color:var(--text); outline:none; transition: 0.3s; }
        .input-style:focus { border-color: var(--accent); box-shadow: var(--glow); }

        .user-item { padding:15px; display:flex; align-items:center; gap:12px; cursor:pointer; border-bottom:1px solid rgba(255,255,255,0.02); transition: 0.2s; }
        .user-item:hover { background: rgba(58, 219, 58, 0.08); }
        .ava { width:42px; height:42px; border-radius:50%; background:var(--accent); color:#000; display:flex; align-items:center; justify-content:center; font-weight:bold; box-shadow: var(--glow); text-shadow: none; }

        .messages { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:12px; }
        .msg { max-width:75%; padding:12px 16px; border-radius:20px; font-size:14px; animation: msgIn 0.3s cubic-bezier(0.1, 0.9, 0.2, 1); box-shadow: var(--shadow); position: relative; border: 1px solid rgba(255,255,255,0.05); }
        @keyframes msgIn { from { opacity:0; transform:translateY(15px) scale(0.95); } to { opacity:1; transform:translateY(0) scale(1); } }
        
        .sent { align-self:flex-end; background:var(--bubble-sent); border-bottom-right-radius:4px; border:1px solid var(--accent); color: #fff; }
        .rec { align-self:flex-start; background:var(--bubble-rec); border-bottom-left-radius:4px; border:1px solid var(--border); }

        .auth-screen { position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:10000; }
        .auth-card { background:var(--bg2); padding:40px; border-radius:28px; border:1px solid var(--border); width:340px; text-align:center; box-shadow: var(--glow); }
        
        .btn { padding:12px; border-radius:12px; border:none; cursor:pointer; font-weight:bold; background:var(--accent); color:#000; transition:0.3s; box-shadow: var(--glow); }
        .btn:hover { transform:translateY(-2px); filter: brightness(1.2); }

        /* Кастомный скроллбар */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div id="authScreen" class="auth-screen">
        <div class="auth-card">
            <h1 style="color:var(--accent); margin-bottom:20px; letter-spacing: 3px; text-shadow: var(--glow);">NEON MESS</h1>
            <input type="text" id="uId" class="input-style" placeholder="Твой ID (логин)" style="margin-bottom:10px;">
            <input type="text" id="uNick" class="input-style" placeholder="Твоё Имя" style="margin-bottom:20px;">
            <button onclick="doAuth()" class="btn" style="width:100%">ВОЙТИ В СЕТЬ</button>
            <div style="margin-top:25px; font-size:11px; opacity:0.4; display:flex; justify-content: space-around;">
                <span onclick="tAcc('test1','Тестер 1')" style="cursor:pointer; color:var(--accent)">test1</span>
                <span onclick="tAcc('test2','Тестер 2')" style="cursor:pointer; color:var(--accent)">test2</span>
            </div>
        </div>
    </div>

    <div id="app">
        <div class="sidebar">
            <div class="side-header">
                <div id="myTag" style="font-weight:bold; color:var(--accent); margin-bottom:15px; font-size:14px; text-shadow: var(--glow);"></div>
                <input type="text" id="fSearch" class="input-style" placeholder="Добавить друга по ID..." onkeypress="if(event.key==='Enter')addF()">
            </div>
            <div id="fList" style="flex:1; overflow-y:auto;"></div>
            <button onclick="switchT()" class="btn" style="margin:15px; font-size:11px; background:transparent; color:var(--accent); border:1px solid var(--accent);">СМЕНИТЬ АТМОСФЕРУ</button>
        </div>
        <div class="chat-area">
            <div id="cHeader" style="padding:18px; background:rgba(10, 15, 10, 0.5); backdrop-filter: blur(5px); border-bottom:1px solid var(--border); font-weight:bold; letter-spacing: 1px;">Выберите контакт</div>
            <div id="mCont" class="messages"></div>
            <div style="padding:15px; background:var(--bg2); border-top:1px solid var(--border); display:flex; gap:12px; align-items:center;">
                <button onclick="scr()" class="btn" style="background:none; color:var(--accent); border:1px solid var(--border); box-shadow:none;">📺</button>
                <input type="text" id="mIn" class="input-style" placeholder="Введите сообщение..." onkeypress="if(event.key==='Enter')send()">
                <button onclick="send()" class="btn" style="width:50px;">🚀</button>
            </div>
        </div>
    </div>

    <script>
        let me={id:'',nick:'',friends:[],theme:'green'}, peer=null, pn, msgs={};
        const CH = 'neon_v7_stable';

        function tAcc(i,n){ document.getElementById('uId').value=i; document.getElementById('uNick').value=n; doAuth(); }

        function doAuth() {
            let i=document.getElementById('uId').value.trim().toLowerCase();
            let n=document.getElementById('uNick').value.trim();
            if(!i || !n) return;
            me.id=i; me.nick=n;
            const saved = JSON.parse(localStorage.getItem('nm_pro_'+me.id) || '{}');
            me.friends = saved.friends || [];
            me.theme = saved.theme || 'green';
            start();
        }

        function start() {
            document.getElementById('authScreen').style.display='none';
            document.getElementById('app').style.display='flex';
            document.getElementById('myTag').innerText = '● ' + me.nick;
            document.documentElement.setAttribute('data-theme', me.theme==='blue'?'blue':'');
            
            pn = new PubNub({ publishKey: 'pub-c-e79dda66-e077-413a-ac73-e4d09bd67dfa', subscribeKey: 'sub-c-f39c2da1-0f5e-4635-9f2a-18459534de30', uuid: me.id });
            pn.addListener({
                message: (e) => {
                    let m = e.message;
                    if(m.to === me.id || m.from === me.id) {
                        let partner = m.from === me.id ? m.to : m.from;
                        if(!msgs[partner]) msgs[partner] = [];
                        msgs[partner].push(m);
                        if(peer && peer.id === partner) renderM();
                    }
                }
            });
            pn.subscribe({ channels: [CH] });
            renderF();
            initStars();
        }

        function addF() {
            let id = document.getElementById('fSearch').value.trim().toLowerCase();
            if(!id || id === me.id) return;
            if(!me.friends.find(f => f.id === id)) {
                me.friends.push({id:id, nick:id});
                save(); renderF();
            }
            document.getElementById('fSearch').value = '';
        }

        function renderF() {
            let l = document.getElementById('fList'); l.innerHTML = '';
            me.friends.forEach(f => {
                let d = document.createElement('div'); d.className = 'user-item';
                d.onclick = () => { peer=f; document.getElementById('cHeader').innerText = '● ' + f.nick; renderM(); };
                d.innerHTML = `<div class="ava">${f.nick[0].toUpperCase()}</div><div><b>${f.nick}</b><br><small style="opacity:0.4">@${f.id}</small></div>`;
                l.appendChild(d);
            });
        }

        function send() {
            let txt = document.getElementById('mIn').value.trim();
            if(!txt || !peer) return;
            pn.publish({ channel: CH, message: { from: me.id, to: peer.id, text: txt } });
            document.getElementById('mIn').value = '';
        }

        function renderM() {
            let c = document.getElementById('mCont'); c.innerHTML = '';
            (msgs[peer.id] || []).forEach(m => {
                let d = document.createElement('div');
                d.className = `msg ${m.from === me.id ? 'sent' : 'rec'}`;
                d.innerText = m.text;
                c.appendChild(d);
            });
            c.scrollTop = c.scrollHeight;
        }

        function save() { localStorage.setItem('nm_pro_'+me.id, JSON.stringify(me)); }
        function switchT() { me.theme = me.theme==='green'?'blue':'green'; document.documentElement.setAttribute('data-theme', me.theme==='blue'?'blue':''); save(); }

        async function scr() {
            try {
                const s = await navigator.mediaDevices.getDisplayMedia({video:true});
                let v = document.createElement('video'); v.srcObject = s; v.autoplay = true;
                v.style = "position:fixed; top:20px; right:20px; width:220px; border-radius:15px; z-index:1000; border:2px solid var(--accent); box-shadow: var(--glow);";
                document.body.appendChild(v);
                s.getVideoTracks()[0].onended = () => v.remove();
            } catch(e) {}
        }

        /* ТА САМАЯ МАГИЯ СВЕТЯШЕК */
        function initStars() {
            const c = document.getElementById('bg-canvas'); const x = c.getContext('2d');
            let w, h, p = [];
            const res = () => { w = c.width = window.innerWidth; h = c.height = window.innerHeight; };
            window.onresize = res; res();
            
            // Создаем частицы
            for(let i=0; i<70; i++) p.push({
                x: Math.random()*w, 
                y: Math.random()*h, 
                s: Math.random()*2.5 + 0.5, 
                v: Math.random()*0.4 + 0.1,
                o: Math.random(), // Прозрачность
                os: Math.random()*0.02 + 0.005 // Скорость мерцания
            });

            function anim() {
                x.clearRect(0,0,w,h); 
                let color = me.theme==='blue'?'58, 142, 219':'58, 219, 58';
                
                p.forEach(i => {
                    i.o += i.os;
                    if(i.o > 1 || i.o < 0) i.os *= -1; // Эффект мерцания
                    
                    x.fillStyle = `rgba(${color}, ${Math.abs(i.o)})`;
                    x.shadowBlur = 10;
                    x.shadowColor = `rgba(${color}, 0.8)`;
                    
                    x.beginPath(); 
                    x.arc(i.x, i.y, i.s, 0, Math.PI*2); 
                    x.fill();
                    
                    i.y -= i.v; 
                    if(i.y < -10) { i.y = h + 10; i.x = Math.random()*w; }
                });
                requestAnimationFrame(anim);
            }
            anim();
        }
    </script>
</body>
</html>
