        * { margin:0;padding:0;box-sizing:border-box; }

        .story-ring-inner img { width:100%;height:100%;border-radius:50%;object-fit:cover; }
        .story-name { font-size:9px;color:var(--text2);max-width:50px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
        .story-viewer { display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:black;z-index:300;align-items:center;justify-content:center; }

        @media(max-width:767px){ .back-btn{display:block;} }
        .chat-avatar { width:34px;height:34px;border-radius:50%;background:var(--accent);color:#000;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:14px;overflow:hidden;flex-shrink:0; }
        .chat-avatar img { width:100%;height:100%;border-radius:50%;object-fit:cover; }
        .chat-name { font-weight:600;font-size:13px; }
        .chat-status { font-size:10px;color:var(--text2); }
        .messages-container { flex:1;overflow-y:auto;padding:10px 12px;-webkit-overflow-scrolling:touch; }

        .msg-row.sent .msg-bubble { background:var(--bubble-sent);color:var(--text);border-bottom-right-radius:4px; }
        .msg-row.received .msg-bubble { background:var(--bubble-rec);color:var(--text);border-bottom-left-radius:4px;border:1px solid var(--border); }

        .reactions-bar { display:flex;gap:3px;flex-wrap:wrap;margin-top:2px;padding:0 4px; }
        .reaction-item { background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:1px 5px;font-size:11px;cursor:pointer; }
        .reaction-item.active { background:var(--accent);color:#000;border-color:var(--accent); }
        .reaction-picker { display:none;position:absolute;bottom:-40px;left:0;background:var(--bg2);border-radius:16px;box-shadow:var(--shadow);padding:4px 8px;gap:3px;z-index:60;border:1px solid var(--border);white-space:nowrap; }
        .reaction-picker.active { display:flex; }
        .reaction-picker span { font-size:18px;cursor:pointer;padding:3px; }
        .input-area { padding:8px 10px;background:var(--header);border-top:1px solid var(--border);display:flex;gap:6px;align-items:center;flex-shrink:0;padding-bottom:max(8px,env(safe-area-inset-bottom)); }
        .msg-input { flex:1;padding:9px 12px;border:none;border-radius:18px;font-size:13px;font-family:inherit;background:var(--input);color:var(--text);outline:none; }
        .voice-btn { width:34px;height:34px;border-radius:50%;background:var(--hover);color:var(--text2);border:none;cursor:pointer;font-size:16px;flex-shrink:0; }
        .voice-btn.recording { background:#ff3333;color:white;animation:pulse 0.8s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
        .send-btn { width:34px;height:34px;border-radius:50%;background:var(--accent);color:#000;border:none;cursor:pointer;font-size:14px;flex-shrink:0; }
        .toast { position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--bg2);color:var(--text);padding:8px 16px;border-radius:16px;font-size:12px;z-index:999;border:1px solid var(--border);animation:fadeIn 0.3s;pointer-events:none; }
        @keyframes fadeIn { from{opacity:0;transform:translateX(-50%) translateY(10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
    </style>
</head>
<body>
    <div class="snow-container" id="snowContainer"></div>
    <div class="login-screen" id="loginScreen">
        <div class="login-card">

            <div class="input-group"><label>Логин</label><input type="text" id="loginInput" placeholder="me" maxlength="15" autocomplete="off"></div>
            <div class="input-group"><label>Пароль</label><input type="password" id="passInput" placeholder="123qwe" maxlength="20" autocomplete="off"></div>
            <button class="btn" onclick="doLogin()">🚀 Войти</button>

    <div class="app" id="app">
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="profile-row">
                    <div class="my-avatar" id="myAvatarSmall">👤</div>
                    <div class="my-info"><div class="my-name" id="myNameDisplay">Я</div><div class="my-status">🟢 онлайн</div></div>
                    <button class="icon-btn" id="themeBtn">🎨</button>
                    <button class="icon-btn" onclick="document.getElementById('storyInput').click()">📸</button>
                    <input type="file" id="storyInput" accept="image/*" style="display:none" onchange="addStory(event)">
                    <button class="logout-btn" onclick="doLogout()">Выйти</button>
                </div>
                <div class="theme-menu" id="themeMenu">
                    <div onclick="setTheme('')">🟢 Стандарт</div><div onclick="setTheme('dark')">🌙 Тёмная</div><div onclick="setTheme('neon')">💚 Неон</div><div onclick="setTheme('purple')">💜 Фиолет</div><div onclick="setTheme('sunset')">🌅 Закат</div><div onclick="setTheme('ocean')">🌊 Океан</div><div onclick="setTheme('cyberpunk')">💛 Киберпанк</div><div onclick="setTheme('minecraft')">⛏️ Minecraft</div><div onclick="setTheme('pink')">💗 Розовый</div>
                </div>
                <input type="text" class="search-box" placeholder="🔍 Поиск..." id="searchInput" oninput="filterUsers()">
            </div>
            <div class="stories-bar" id="storiesBar"></div>

        </div>
        <div class="story-viewer" id="storyViewer"><button class="story-close" onclick="closeStory()">✕</button><img id="storyImage" src="" alt=""></div>
        <div class="chat-area" id="chatArea">
            <div class="chat-header"><button class="back-btn" onclick="closeChat()">←</button><div class="chat-avatar" id="chatAvatar">💬</div><div><div class="chat-name" id="chatName">Выбери контакт</div><div class="chat-status" id="chatStatus"></div></div></div>
            <div class="messages-container" id="messagesContainer"></div>
            <div class="input-area">
                <input type="text" class="msg-input" id="messageInput" placeholder="Сообщение..." onkeypress="if(event.key==='Enter'){sendMsg();}" autocomplete="off">
                <button class="voice-btn" id="voiceBtn" onclick="toggleVoice()">🎤</button>
                <button class="send-btn" onclick="sendMsg()">➤</button>
            </div>
        </div>
    </div>
    <script>
        var PUB="pub-c-e79dda66-e077-413a-ac73-e4d09bd67dfa",SUB="sub-c-f39c2da1-0f5e-4635-9f2a-18459534de30";
        var pn,me='',myAva='',cur='',onl=[],msgs={},tmpAva='',reg=true,refInt,stories={},mr,ach=[],rec=false;
        var REAC=['❤️','🔥','😂','😢','😮','👏'];

        function snow(){var c=document.getElementById('snowContainer');c.innerHTML='';for(var i=0;i<30;i++){var f=document.createElement('div');f.className='snowflake';f.textContent='❄';f.style.left=Math.random()*100+'%';f.style.fontSize=(Math.random()*14+6)+'px';f.style.animationDuration=(Math.random()*5+5)+'s';f.style.animationDelay=Math.random()*5+'s';c.appendChild(f);}}
        function setTheme(t){document.documentElement.setAttribute('data-theme',t);localStorage.setItem('nm_theme',t);document.getElementById('themeMenu').classList.remove('active');if(t===''||t==='minecraft')snow();else document.getElementById('snowContainer').innerHTML='';}
        setTheme(localStorage.getItem('nm_theme')||'');snow();
        document.addEventListener('click',function(e){if(!e.target.closest('#themeBtn')&&!e.target.closest('#themeMenu'))document.getElementById('themeMenu').classList.remove('active');});
        document.getElementById('themeBtn').addEventListener('click',function(e){e.stopPropagation();document.getElementById('themeMenu').classList.toggle('active');});

        function pickAvatar(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){tmpAva=ev.target.result;document.getElementById('loginAvatar').innerHTML='<img src="'+tmpAva+'">';};r.readAsDataURL(f);}
        function toggleMode(){reg=!reg;document.querySelector('.btn-outline').textContent=reg?'📝 Создать аккаунт':'🔑 Уже есть аккаунт';}
        function hash(s){return CryptoJS.SHA256(s).toString();}
        function doLogin(){
            var l=document.getElementById('loginInput').value.trim(),p=document.getElementById('passInput').value.trim();
            if(!l||l.length<2){err('Логин минимум 2 символа');return;}if(!p||p.length<3){err('Пароль минимум 3 символа');return;}
            var hp=hash(p),sp=localStorage.getItem('nm_'+l);
            if(reg){if(sp){err('Логин занят!');return;}localStorage.setItem('nm_'+l,hp);}
            else{if(!sp){err('Аккаунт не найден');return;}if(sp!==hp){err('Неверный пароль');return;}}
            me=l;myAva=tmpAva;document.getElementById('loginScreen').style.display='none';
            var app=document.getElementById('app');app.style.display='block';if(window.innerWidth>=768)app.style.display='flex';
            document.getElementById('myAvatarSmall').innerHTML=myAva?'<img src="'+myAva+'">':me.charAt(0).toUpperCase();
            document.getElementById('myNameDisplay').textContent=me;load();initPN();
            localStorage.setItem('nm_user',me);if(myAva)localStorage.setItem('nm_ava',myAva);
        }
        function err(m){var e=document.getElementById('loginError');e.textContent=m;e.style.display='block';setTimeout(function(){e.style.display='none';},3000);}
        function toast(m){var o=document.querySelector('.toast');if(o)o.remove();var t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(function(){t.remove();},2000);}

        function initPN(){
            if(pn){pn.unsubscribeAll();}
            pn=new PubNub({publishKey:PUB,subscribeKey:SUB,uuid:me});
            pn.addListener({message:function(e){
                var m=e.message;
                if(m.type==='on'){if(m.u!==me&&onl.indexOf(m.u)===-1){onl.push(m.u);renderUsers();toast('👋 '+m.u+' в сети');}return;}
                if(m.type==='who'){pn.publish({channel:'neonmess',message:{type:'on',u:me}});return;}
                if(m.type==='story'){if(!stories[m.u])stories[m.u]=[];stories[m.u].push({img:m.img,t:Date.now()});renderStoriesBar();return;}
                if(m.type==='msg'||m.type==='voice'||m.type==='reaction'){
                    var key=m.to===me?m.from:(m.from===me?m.to:null);if(!key)return;
                    if(!msgs[key])msgs[key]=[];
                    var ex=-1;for(var i=0;i<msgs[key].length;i++){if(msgs[key][i].id===m.id){ex=i;break;}}
                    if(ex!==-1)msgs[key][ex]=m;else msgs[key].push(m);
                    save();if(cur===key)renderMsgs();renderUsers();
                }
            }});
            pn.subscribe({channels:['neonmess']});
            setTimeout(function(){pn.publish({channel:'neonmess',message:{type:'on',u:me}});},300);
            setTimeout(function(){pn.publish({channel:'neonmess',message:{type:'who'}});},800);
            if(refInt)clearInterval(refInt);
            refInt=setInterval(function(){pn.publish({channel:'neonmess',message:{type:'who'}});pn.publish({channel:'neonmess',message:{type:'on',u:me}});},5000);
        }

        function refreshUsers(){onl=[];renderUsers();if(pn){pn.publish({channel:'neonmess',message:{type:'on',u:me}});setTimeout(function(){pn.publish({channel:'neonmess',message:{type:'who'}});},300);}toast('🔄 Обновлено');}
        function addStory(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){if(!stories[me])stories[me]=[];stories[me].push({img:ev.target.result,t:Date.now()});renderStoriesBar();pn.publish({channel:'neonmess',message:{type:'story',u:me,img:ev.target.result}});toast('📸 Готово!');};r.readAsDataURL(f);}
        function viewStory(u){var s=stories[u];if(!s||s.length===0){toast('Нет историй');return;}document.getElementById('storyImage').src=s[s.length-1].img;document.getElementById('storyViewer').classList.add('active');}
        function closeStory(){document.getElementById('storyViewer').classList.remove('active');}
        function renderStoriesBar(){var b=document.getElementById('storiesBar');var h='';if(stories[me]&&stories[me].length>0){var s=stories[me];h+='<div class="story-item" onclick="viewStory(\''+me+'\')"><div class="story-ring"><div class="story-ring-inner"><img src="'+s[s.length-1].img+'"></div></div><div class="story-name">Я</div></div>';}var ks=Object.keys(stories);for(var i=0;i<ks.length;i++){if(ks[i]===me)continue;var us=stories[ks[i]];if(us.length>0)h+='<div class="story-item" onclick="viewStory(\''+ks[i]+'\')"><div class="story-ring"><div class="story-ring-inner"><img src="'+us[us.length-1].img+'"></div></div><div class="story-name">'+ks[i]+'</div></div>';}h+='<div class="story-item" onclick="document.getElementById(\'storyInput\').click()"><div class="story-ring"><div class="story-ring-inner" style="font-size:22px;color:var(--accent)">+</div></div><div class="story-name">Доб.</div></div>';b.innerHTML=h;}

        function toggleVoice(){if(rec)stopRec();else startRec();}
        async function startRec(){try{var s=await navigator.mediaDevices.getUserMedia({audio:true});mr=new MediaRecorder(s);ach=[];mr.ondataavailable=function(e){if(e.data.size>0)ach.push(e.data);};mr.onstop=function(){var b=new Blob(ach,{type:'audio/webm'});var r=new FileReader();r.onload=function(ev){sendVoice(ev.target.result);};r.readAsDataURL(b);s.getTracks().forEach(function(t){t.stop();});};mr.start();rec=true;document.getElementById('voiceBtn').classList.add('recording');document.getElementById('voiceBtn').textContent='⏹';toast('🎤 Запись...');setTimeout(function(){if(rec)stopRec();},15000);}catch(e){toast('❌ Нет микрофона');}}
        function stopRec(){if(mr&&rec){mr.stop();rec=false;document.getElementById('voiceBtn').classList.remove('recording');document.getElementById('voiceBtn').textContent='🎤';}}
        function sendVoice(d){if(!cur||!pn)return;var m={id:Date.now().toString(),type:'voice',from:me,to:cur,audio:d,t:new Date().toISOString(),reactions:{}};pn.publish({channel:'neonmess',message:m});if(!msgs[cur])msgs[cur]=[];msgs[cur].push(m);save();renderMsgs();}

        function sendMsg(){if(!cur||!pn)return;var t=document.getElementById('messageInput').value.trim();if(!t)return;var m={id:Date.now().toString(),type:'msg',from:me,to:cur,text:t,t:new Date().toISOString(),reactions:{}};pn.publish({channel:'neonmess',message:m});if(!msgs[cur])msgs[cur]=[];msgs[cur].push(m);save();renderMsgs();document.getElementById('messageInput').value='';document.getElementById('messageInput').focus();}
        function addReaction(id,em){if(!cur||!pn)return;var ml=msgs[cur];if(!ml)return;var m=null;for(var i=0;i<ml.length;i++){if(ml[i].id===id){m=ml[i];break;}}if(!m)return;if(!m.reactions)m.reactions={};if(!m.reactions[em])m.reactions[em]=[];var idx=m.reactions[em].indexOf(me);if(idx!==-1){m.reactions[em].splice(idx,1);if(m.reactions[em].length===0)delete m.reactions[em];}else m.reactions[em].push(me);m.type='reaction';pn.publish({channel:'neonmess',message:m});save();renderMsgs();document.querySelectorAll('.reaction-picker').forEach(function(p){p.classList.remove('active');});}
        function addMsgDOM(m){var c=document.getElementById('messagesContainer'),r=document.createElement('div');r.className='msg-row '+(m.from===me?'sent':'received');r.id='msg-'+m.id;var ct=m.type==='voice'?'<div class="voice-msg"><button class="voice-play-btn" onclick="playV(\''+m.id+'\')">▶</button>🎤 ГС</div>':esc(m.text);if(m.type==='voice')window['aud_'+m.id]=m.audio;var rh='';if(m.reactions&&Object.keys(m.reactions).length>0){rh='<div class="reactions-bar">';var ks=Object.keys(m.reactions);for(var k=0;k<ks.length;k++){var e=ks[k],u=m.reactions[e],a=u.indexOf(me)!==-1;rh+='<span class="reaction-item'+(a?' active':'')+'" onclick="addReaction(\''+m.id+'\',\''+e+'\')">'+e+' '+u.length+'</span>';}rh+='</div>';}var ph='<div class="reaction-picker" id="pk-'+m.id+'">';REAC.forEach(function(e){ph+='<span onclick="addReaction(\''+m.id+'\',\''+e+'\')">'+e+'</span>';});ph+='</div>';r.innerHTML='<div class="msg-bubble" onclick="togPk(\''+m.id+'\')">'+ct+ph+'</div>'+rh;c.appendChild(r);c.scrollTop=c.scrollHeight;}
        function playV(id){var d=window['aud_'+id];if(!d)return;new Audio(d).play().catch(function(){});}
        function togPk(id){var p=document.getElementById('pk-'+id);if(p)p.classList.toggle('active');}
        function renderMsgs(){var c=document.getElementById('messagesContainer');c.innerHTML='';var ml=msgs[cur]||[];if(ml.length===0){c.innerHTML='<div class="empty-chat">Нет сообщений</div>';return;}ml.forEach(function(m){addMsgDOM(m);});}
        function openChat(u){cur=u;if(!msgs[cur])msgs[cur]=[];document.getElementById('chatAvatar').textContent=u.charAt(0).toUpperCase();document.getElementById('chatName').textContent=u;document.getElementById('chatStatus').textContent='онлайн';document.getElementById('chatStatus').style.color='var(--online)';document.getElementById('chatArea').classList.add('active');renderMsgs();renderUsers();setTimeout(function(){document.getElementById('messageInput').focus();},200);}
        function closeChat(){cur=null;document.getElementById('chatArea').classList.remove('active');renderUsers();}
        function renderUsers(){var o=onl.filter(function(u){return u!==me;});var h='';if(o.length===0){h='<div style="padding:20px;color:var(--text2);text-align:center;font-size:12px;">Никого онлайн</div>';}else{o.forEach(function(u){var s=cur===u?' selected':'';var lm=msgs[u]?msgs[u][msgs[u].length-1]:null;var lt=lm?(lm.text?lm.text.substring(0,25):(lm.type==='voice'?'🎤 Голосовое':'')):'';h+='<div class="user-item'+s+'" onclick="openChat(\''+u+'\')"><div class="user-avatar">'+u.charAt(0).toUpperCase()+'</div><div class="user-info"><div class="user-name">'+u+'</div><div class="user-last">'+(lt||'Нет сообщений')+'</div></div><div class="online-dot"></div></div>';});}document.getElementById('usersOnline').innerHTML=h;}
        function filterUsers(){var q=document.getElementById('searchInput').value.toLowerCase();document.querySelectorAll('.user-item').forEach(function(el){var n=(el.querySelector('.user-name')||{}).textContent||'';el.style.display=n.toLowerCase().indexOf(q)!==-1?'flex':'none';});}
        function doLogout(){if(pn){pn.unsubscribeAll();pn=null;}if(refInt){clearInterval(refInt);refInt=null;}me='';myAva='';cur=null;onl=[];msgs={};document.getElementById('loginScreen').style.display='flex';document.getElementById('app').style.display='none';}
        function save(){try{var d={};Object.keys(msgs).forEach(function(k){d[k]=msgs[k].slice(-500);});localStorage.setItem('nm_msgs_'+me,JSON.stringify(d));localStorage.setItem('nm_user',me);if(myAva)localStorage.setItem('nm_ava',myAva);}catch(e){}}
        function load(){var s=localStorage.getItem('nm_msgs_'+me);if(s){try{msgs=JSON.parse(s);}catch(e){msgs={};}}}
        function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}

        var su=localStorage.getItem('nm_user'),sa=localStorage.getItem('nm_ava');
        if(su){me=su;myAva=sa||'';document.getElementById('loginInput').value=su;if(sa){document.getElementById('loginAvatar').innerHTML='<img src="'+sa+'">';tmpAva=sa;}document.getElementById('passInput').placeholder='Пароль';reg=false;document.querySelector('.btn-outline').textContent='🔑 Уже есть аккаунт';}
    </script>
</body>
</html>
