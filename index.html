<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>⚡ NeonMess Ultra Pro</title>
    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.7.4.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root { 
            --bg:#0a0f0a; --bg2:#111a11; --text:#c8e6c8; --text2:#8fbc8f; 
            --border:#2a3a2a; --accent:#3adb3a; --input:#152015;
            --bubble-sent:#1a3a1a; --bubble-rec:#152015;
            --shadow: 0 0 20px rgba(58, 219, 58, 0.15);
            --neon-glow: 0 0 10px rgba(58, 219, 58, 0.5);
        }
        [data-theme="neon-dark"] {
            --bg:#050505; --bg2:#0a0a0a; --text:#fff; --text2:#0ff;
            --border:#0ff; --accent:#0ff; --input:#111;
            --bubble-sent:#003333; --bubble-rec:#151515;
            --shadow: 0 0 25px rgba(0, 255, 255, 0.2);
            --neon-glow: 0 0 15px #0ff;
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background:var(--bg); color:var(--text); height:100vh; overflow:hidden; transition: 0.3s; }

        /* ТЕ САМЫЕ СВЕТЯШКИ НА ФОНЕ */
        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; width: 100%; height: 100%; opacity: 0.4; pointer-events: none; }

        #app { display:none; height:100vh; width:100vw; display:flex; }
        .sidebar { width:280px; border-right:1px solid var(--border); background:var(--bg2); display:flex; flex-direction:column; z-index: 10; box-shadow: var(--shadow); }
        
        .side-header { padding:20px; border-bottom:1px solid var(--border); }
        .search-input { 
            width:100%; padding:10px; border-radius:12px; border:1px solid var(--border); 
            background:var(--input); color:var(--text); outline:none; transition: 0.3s;
        }
        .search-input:focus { border-color: var(--accent); box-shadow: var(--neon-glow); }

        .user-item { 
            padding:15px; display:flex; align-items:center; gap:12px; cursor:pointer; 
            transition:0.2s; border-bottom:1px solid rgba(255,255,255,0.03); 
        }
        .user-item:hover { background: rgba(58, 219, 58, 0.05); }
        .ava { 
            width:42px; height:42px; border-radius:50%; background:var(--accent); 
            display:flex; align-items:center; justify-content:center; 
            color:#000; font-weight:bold; box-shadow: var(--neon-glow);
        }

        .chat-area { flex:1; display:flex; flex-direction:column; background: transparent; position: relative; }
        .chat-header { 
            padding:15px 20px; background:var(--bg2); border-bottom:1px solid var(--border); 
            display:flex; justify-content:space-between; align-items:center; box-shadow: var(--shadow);
        }

        .messages { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:12px; }
        .msg { 
            max-width:75%; padding:10px 16px; border-radius:18px; font-size:14px; 
            line-height:1.4; animation: msgSlide 0.3s ease; position: relative;
            box-shadow: var(--shadow);
        }
        @keyframes msgSlide { from { opacity:0; transform:translateY(15px); } to { opacity:1; transform:translateY(0); } }
        
        .sent { align-self:flex-end; background:var(--bubble-sent); border-bottom-right-radius:4px; border: 1px solid var(--accent); }
        .rec { align-self:flex-start; background:var(--bubble-rec); border-bottom-left-radius:4px; border: 1px solid var(--border); }

        .input-bar { 
            padding:15px; background:var(--bg2); border-top:1px solid var(--border); 
            display:flex; gap:12px; align-items:center; 
        }

        /* Экран входа */
        .auth-screen { position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:10000; }
        .auth-card { 
            background:var(--bg2); padding:40px; border-radius:24px; border:1px solid var(--border); 
            width:340px; text-align:center; box-shadow: var(--neon-glow);
        }

        video { width:220px; border-radius:12px; border:2px solid var(--accent); background:#000; margin-bottom:10px; box-shadow: var(--neon-glow); }
        .btn { padding:12px 20px; border-radius:12px; border:none; cursor:pointer; font-weight:bold; transition:0.3s; }
        .btn-neon { background:var(--accent); color:#000; box-shadow: var(--neon-glow); }
        .btn-neon:hover { transform: scale(1.05); }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div id="authScreen" class="auth-screen">
        <div class="auth-card">
            <h1 style="color:var(--accent); margin-bottom:25px; letter-spacing:2px;">NEON MESS</h1>
            <input type="text" id="usernameIn" class="search-input" placeholder="Ваш ID (для друзей)" style="margin-bottom:15px;">
            <input type="text" id="nicknameIn" class="search-input" placeholder="Ваш Никнейм" style="margin-bottom:20px;">
            <button onclick="saveProfile()" class="btn btn-neon" style="width:100%">ВОЙТИ В СЕТЬ</button>
            <div style="margin-top:25px; font-size:11px; opacity:0.5; display:flex; justify-content:space-between;">
                <span onclick="testAcc('test1', '🤖 ТЕСТЕР 1')" style="cursor:pointer; color:var(--accent)">ТЕСТ-1</span>
                <span onclick="testAcc('test2', '🦊 ТЕСТЕР 2')" style="cursor:pointer; color:var(--accent)">ТЕСТ-2</span>
            </div>
        </div>
    </div>

    <div id="app">
        <div class="sidebar">
            <div class="side-header">
                <div id="myInfo" style="font-size:15px; margin-bottom:15px; color:var(--accent); text-shadow: var(--neon-glow);"></div>
                <input type="text" id="friendSearch" class="search-input" placeholder="Добавить друга по ID..." onkeypress="if(event.key==='Enter')addFriend()">
            </div>
            <div id="friendsList" style="flex:1; overflow-y:auto;"></div>
            <div style="padding:15px; border-top:1px solid var(--border)">
                <button onclick="toggleTheme()" class="btn" style="width:100%; background:var(--input); color:var(--text); border:1px solid var(--border);">СМЕНИТЬ ТЕМУ</button>
            </div>
        </div>

        <div class="chat-area">
            <div id="chatHeader" class="chat-header">
                <div id="peerLabel">Выберите контакт</div>
                <button onclick="startScreenShare()" id="shareBtn" style="display:none; background:none; border:none; color:var(--accent); cursor:pointer; font-size:18px;">📺</button>
            </div>
            
            <div id="videoGrid" style="position:absolute; top:70px; right:20px; z-index:100;">
                <video id="localVideo" autoplay muted playsinline style="display:none"></video>
            </div>

            <div id="msgContainer" class="messages"></div>

            <div class="input-bar">
                <input type="text" id="mInput" class="search-input" placeholder="Написать сообщение..." onkeypress="if(event.key==='Enter')send()">
                <button onclick="send()" class="btn btn-neon">🚀</button>
            </div>
        </div>
    </div>

    <script>
        let me = { id: '', nick: '', friends: [], theme: 'green' };
        let peer = null;
        let pn;
        const PUB = 'pub-c-e79dda66-e077-413a-ac73-e4d09bd67dfa';
        const SUB = 'sub-c-f39c2da1-0f5e-4635-9f2a-18459534de30';

        window.onload = () => {
            const saved = localStorage.getItem('neon_pro_v6');
            if(saved) {
                me = JSON.parse(saved);
                applyProfile();
            }
            initCanvas();
        };

        function testAcc(id, nick) {
            document.getElementById('usernameIn').value = id;
            document.getElementById('nicknameIn').value = nick;
            saveProfile();
        }

        function saveProfile() {
            let id = document.getElementById('usernameIn').value.trim().toLowerCase();
            let nick = document.getElementById('nicknameIn').value.trim();
            if(!id || !nick) return;
            me.id = id; me.nick = nick;
            if(!me.friends) me.friends = [];
            localStorage.setItem('neon_pro_v6', JSON.stringify(me));
            applyProfile();
        }

        function applyProfile() {
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            document.getElementById('myInfo').innerText = `• ${me.nick}`;
            document.documentElement.setAttribute('data-theme', me.theme === 'blue' ? 'neon-dark' : '');
            initPubNub();
            renderFriends();
        }

        function initPubNub() {
            pn = new PubNub({ publishKey: PUB, subscribeKey: SUB, uuid: me.id });
            pn.addListener({
                message: (e) => {
                    if(e.message.to === me.id || e.message.from === me.id) {
                        let other = e.message.from === me.id ? e.message.to : e.message.from;
                        if(!me.friends.find(f => f.id === other)) {
                            me.friends.push({id: other, nick: other});
                            saveData(); renderFriends();
                        }
                        showMsg(e.message);
                    }
                }
            });
            pn.subscribe({ channels: ['neon_v6_final'] });
        }

        function addFriend() {
            let fId = document.getElementById('friendSearch').value.trim().toLowerCase();
            if(!fId || fId === me.id) return;
            if(!me.friends.find(f => f.id === fId)) {
                me.friends.push({ id: fId, nick: fId });
                saveData(); renderFriends();
            }
            document.getElementById('friendSearch').value = '';
        }

        function renderFriends() {
            let list = document.getElementById('friendsList');
            list.innerHTML = '';
            me.friends.forEach(f => {
                let div = document.createElement('div');
                div.className = 'user-item';
                div.onclick = () => selectPeer(f);
                div.innerHTML = `<div class="ava">${f.nick[0].toUpperCase()}</div><div><b>${f.nick}</b><br><small style="opacity:0.5">@${f.id}</small></div>`;
                list.appendChild(div);
            });
        }

        function selectPeer(f) {
            peer = f;
            document.getElementById('peerLabel').innerHTML = `<span style="color:var(--accent)">@</span>${f.nick}`;
            document.getElementById('shareBtn').style.display = 'block';
            document.getElementById('msgContainer').innerHTML = '';
        }

        function send() {
            if(!peer) return;
            let val = document.getElementById('mInput').value.trim();
            if(!val) return;
            pn.publish({
                channel: 'neon_v6_final',
                message: { from: me.id, to: peer.id, text: val }
            });
            document.getElementById('mInput').value = '';
        }

        function showMsg(m) {
            if(!peer || (m.from !== peer.id && m.to !== peer.id)) return;
            let div = document.createElement('div');
            div.className = `msg ${m.from === me.id ? 'sent' : 'rec'}`;
            div.innerText = m.text;
            document.getElementById('msgContainer').appendChild(div);
            document.getElementById('msgContainer').scrollTop = 99999;
        }

        async function startScreenShare() {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                const v = document.getElementById('localVideo');
                v.srcObject = stream; v.style.display = 'block';
                stream.getVideoTracks()[0].onended = () => v.style.display = 'none';
            } catch (e) {}
        }

        function toggleTheme() {
            me.theme = me.theme === 'green' ? 'blue' : 'green';
            document.documentElement.setAttribute('data-theme', me.theme === 'blue' ? 'neon-dark' : '');
            saveData();
        }

        function saveData() { localStorage.setItem('neon_pro_v6', JSON.stringify(me)); }

        // ЭФФЕКТ СВЕТЯШЕК (ЧАСТИЦ)
        function initCanvas() {
            const c = document.getElementById('bg-canvas');
            const ctx = c.getContext('2d');
            let w, h, particles = [];
            const resize = () => { w = c.width = window.innerWidth; h = c.height = window.innerHeight; };
            window.addEventListener('resize', resize); resize();

            for(let i=0; i<60; i++) {
                particles.push({
                    x: Math.random() * w, y: Math.random() * h,
                    size: Math.random() * 2 + 1,
                    speed: Math.random() * 0.5 + 0.1,
                    opacity: Math.random()
                });
            }

            function animate() {
                ctx.clearRect(0, 0, w, h);
                let theme = document.documentElement.getAttribute('data-theme');
                ctx.fillStyle = theme === 'neon-dark' ? '#0ff' : '#3adb3a';
                
                particles.forEach(p => {
                    ctx.globalAlpha = p.opacity;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                    p.y -= p.speed;
                    if(p.y < -10) p.y = h + 10;
                });
                requestAnimationFrame(animate);
            }
            animate();
        }
    </script>
</body>
</html>
